name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Detect whether all commits since the last tag are deps-only / chores.
      # Logic lives in scripts/release/releasable.ts; skip patterns mirror the
      # cliff.toml commit_parsers with skip=true (a test fails if they drift).
      # Serial-number note: skipping a run leaves a gap in vYYYY.M.serial —
      # that is acceptable; the counter always counts existing tags.
      - name: Check for releasable commits
        id: check
        run: npx --yes tsx@4 scripts/release/check-releasable.ts

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: "22"

      - name: Calculate CalVer
        id: version
        if: steps.check.outputs.skip != 'true'
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          PREFIX="v${YEAR}.${MONTH}."
          EXISTING=$(git tag -l "${PREFIX}*" | wc -l | tr -d ' ')
          SERIAL=$((EXISTING + 1))
          echo "version=${PREFIX}${SERIAL}" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        if: steps.check.outputs.skip != 'true'
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: git-cliff

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.skip != 'true'
        run: |
          NOTES=$(git-cliff --config cliff.toml --latest --strip header 2>/dev/null || echo "No notable changes.")
          {
            echo "content<<CLIFF_EOF"
            echo "$NOTES"
            echo "CLIFF_EOF"
          } >> "$GITHUB_OUTPUT"

      # Software Bill of Materials (CycloneDX) for each release. Generated from
      # the lockfile only (no `npm ci` needed) and pinned to a specific tool
      # version. The SBOM is attached as a release asset, never committed.
      - name: Generate CycloneDX SBOM
        if: steps.check.outputs.skip != 'true'
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@4.2.1 \
            --package-lock-only \
            --output-format JSON \
            --spec-version 1.5 \
            --output-file sbom.cdx.json

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.changelog.outputs.content }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --title "$VERSION" --notes "$NOTES" sbom.cdx.json

      - name: Generate SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SLUG="schmug/dmarcheck"
          # Download the auto-generated source archives GitHub creates for each release tag.
          # These may take a few seconds to appear; retry once if the first attempt fails.
          gh release download "$VERSION" --repo "$SLUG" --archive=tar.gz \
            --output "dmarcheck-${VERSION}.tar.gz" || \
          gh release download "$VERSION" --repo "$SLUG" --archive=tar.gz \
            --output "dmarcheck-${VERSION}.tar.gz"
          gh release download "$VERSION" --repo "$SLUG" --archive=zip \
            --output "dmarcheck-${VERSION}.zip" || \
          gh release download "$VERSION" --repo "$SLUG" --archive=zip \
            --output "dmarcheck-${VERSION}.zip"
          sha256sum sbom.cdx.json \
            "dmarcheck-${VERSION}.tar.gz" \
            "dmarcheck-${VERSION}.zip" > SHA256SUMS

      - name: Install cosign (Sigstore)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign CLI explicitly so the signing binary can't silently
          # drift on a future cosign-installer bump. v3.0.6 is installer
          # v4.1.2's default; cosign 3.x requires installer v4+.
          cosign-release: 'v3.0.6'

      - name: Sign SHA256SUMS with Sigstore keyless signing
        run: |
          cosign sign-blob --yes SHA256SUMS --bundle SHA256SUMS.bundle

      - name: Upload SHA256SUMS and signature bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release upload "$VERSION" SHA256SUMS SHA256SUMS.bundle

      - name: Verify SHA256SUMS signature (post-release smoke)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SLUG="schmug/dmarcheck"
          # Download the just-uploaded files; retry once for asset-propagation lag.
          gh release download "$VERSION" --repo "$SLUG" \
            --pattern "SHA256SUMS" --output verify-SHA256SUMS || \
          gh release download "$VERSION" --repo "$SLUG" \
            --pattern "SHA256SUMS" --output verify-SHA256SUMS
          gh release download "$VERSION" --repo "$SLUG" \
            --pattern "SHA256SUMS.bundle" --output verify-SHA256SUMS.bundle || \
          gh release download "$VERSION" --repo "$SLUG" \
            --pattern "SHA256SUMS.bundle" --output verify-SHA256SUMS.bundle
          cosign verify-blob \
            --bundle verify-SHA256SUMS.bundle \
            --certificate-identity-regexp "https://github.com/schmug/dmarcheck/.github/workflows/release.yml" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            verify-SHA256SUMS
