name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  DCO:
    runs-on: ubuntu-latest
    steps:
      - name: Check Signed-off-by trailers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
        shell: bash
        run: |
          set -euo pipefail

          # Fetch the full list of commits in this PR via pagination.
          # GitHub's PR-commits endpoint returns at most 100 items per page and
          # at most 250 commits total — that is GitHub's documented ceiling for
          # this endpoint. We walk pages until we receive a short page (<100
          # items), which signals the last page, then validate every accumulated
          # commit. We stop early at page 3 (300-item budget) to avoid an
          # infinite loop if GitHub ever returns exactly-full pages beyond 250.
          commits="[]"
          page=1
          while true; do
            page_data=$(curl -sSf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$API_URL/repos/$REPO/pulls/$PR_NUMBER/commits?per_page=100&page=$page")
            page_len=$(echo "$page_data" | jq 'length')
            commits=$(echo "$commits $page_data" | jq -sc 'add')
            if [ "$page_len" -lt 100 ]; then
              # Short page — we have fetched all commits.
              break
            fi
            # Stop after 3 pages (300-item budget > 250-commit ceiling).
            if [ "$page" -ge 3 ]; then
              break
            fi
            page=$((page + 1))
          done

          total=$(echo "$commits" | jq 'length')
          # Fail closed above the 250-commit ceiling — GitHub's PR-commits
          # endpoint documents a hard maximum of 250 commits across all pages,
          # so any PR that exceeds this limit has commits we cannot read.
          if [ "$total" -gt 250 ]; then
            echo "ERROR: PR has more than 250 commits — split the PR before the DCO check can verify all commits."
            exit 1
          fi

          failed=0

          while IFS= read -r row; do
            sha=$(echo "$row" | jq -r '.sha')
            message=$(echo "$row" | jq -r '.commit.message')
            author_name=$(echo "$row" | jq -r '.commit.author.name')
            author_email=$(echo "$row" | jq -r '.commit.author.email')

            # Skip automated commits that cannot run `git commit -s`.
            #
            # NOTE: matching the @users.noreply.github.com host also skips humans
            # who use GitHub's private-email default — this is intentionally broad
            # for now so existing unsigned autonomous-routine PRs (authored by the
            # admin account via a noreply address) keep passing. Narrow this to the
            # commits API `.author.type == "Bot"` signal once the routines sign
            # their own commits; that work is gated on the bot-identity split (#299).
            email_host="${author_email##*@}"
            if [ "$email_host" = "users.noreply.github.com" ]; then
              echo "SKIP $sha — noreply email ($author_email)"
              continue
            fi

            # Skip commits whose author name contains [bot] or is github-actions.
            if echo "$author_name" | grep -qF '[bot]'; then
              echo "SKIP $sha — bot name ($author_name)"
              continue
            fi
            if [ "$author_name" = "github-actions" ]; then
              echo "SKIP $sha — github-actions author"
              continue
            fi

            # Require a Signed-off-by trailer carrying the author's email in the
            # canonical `Signed-off-by: Name <email>` angle-bracket form (matching
            # a bare email substring would also accept an address mentioned
            # elsewhere in the message).
            if echo "$message" | grep -qF "Signed-off-by:"; then
              if echo "$message" | grep -F "Signed-off-by:" | grep -qF "<$author_email>"; then
                echo "OK   $sha — signed off by $author_email"
              else
                echo "FAIL $sha — Signed-off-by present but no trailer matches <$author_email>"
                failed=$((failed + 1))
              fi
            else
              echo "FAIL $sha — missing Signed-off-by trailer (author: $author_name <$author_email>)"
              echo "     Commit message: $(echo "$message" | head -1)"
              failed=$((failed + 1))
            fi
          done < <(echo "$commits" | jq -c '.[]')

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "ERROR: $failed commit(s) lack a valid Signed-off-by trailer."
            echo "Use 'git commit -s' to add the trailer automatically."
            echo "For existing commits: 'git rebase --signoff HEAD~N' then force-push."
            exit 1
          fi

          # NOTE: verifies the PR's individual commits. This repo squash-merges
          # with the message default set to the combined commit messages
          # (squash_merge_commit_message = COMMIT_MESSAGES), so these per-commit
          # Signed-off-by trailers are carried onto main automatically. The only
          # residual gap is a manual edit of the squash message at merge time,
          # which no PR-time check can prevent. Keep that repo setting — see the
          # DCO squash-merge invariant in CLAUDE.md.
          echo ""
          echo "All commits have valid Signed-off-by trailers."
